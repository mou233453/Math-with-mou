<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>math with Mou</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-color: #f4f7f6;
            background-image: 
                linear-gradient(rgba(52, 152, 219, 0.12) 1px, transparent 1px),
                linear-gradient(90deg, rgba(52, 152, 219, 0.12) 1px, transparent 1px);
            background-size: 25px 25px; 
            overflow-x: hidden; /* لمنع ظهور شريط التمرير الأفقي في الشاشة كلها */
            position: relative;
        }

        /* الرموز الخلفية */
        .math-symbol { position: absolute; color: rgba(52, 152, 219, 0.15); font-size: 80px; font-weight: bold; z-index: -1; user-select: none; animation: float 6s ease-in-out infinite; }
        .symbol-1 { top: 10%; left: 10%; animation-delay: 0s; }
        .symbol-2 { top: 70%; left: 15%; animation-delay: 1s; font-size: 100px; }
        .symbol-3 { top: 15%; right: 10%; animation-delay: 2s; font-size: 90px; }
        .symbol-4 { top: 80%; right: 15%; animation-delay: 3s; }

        @keyframes float { 0% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(5deg); } 100% { transform: translateY(0px) rotate(0deg); } }

        /* الصندوق الرئيسي متجاوب */
        .glass-card {
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6); 
            width: 92%; /* يأخذ 92% من الشاشة في الموبايل */
            max-width: 550px; /* لا يتعدى هذا الحجم في الحاسوب */
            border-radius: 24px;
            padding: 40px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0,0,0,0.05); 
            text-align: center; z-index: 10;
            margin: 20px 0; /* مسافة أمان من الأعلى والأسفل للموبايل */
        }

        .header-icon { font-size: 45px; margin-bottom: 5px; text-shadow: 0 4px 10px rgba(0,0,0,0.1); display: block; }
        h1 { color: #1e293b; font-size: 28px; font-weight: 900; margin: 0 0 5px 0; letter-spacing: -0.5px; }
        p.subtitle { color: #64748b; font-size: 15px; margin-bottom: 30px; }
        
        .upload-area {
            border: 2px dashed #cbd5e1; border-radius: 16px; padding: 30px 15px; cursor: pointer;
            transition: all 0.3s ease; background-color: rgba(248, 250, 252, 0.8);
            margin-bottom: 25px; position: relative;
        }
        .upload-area:hover, .upload-area:active { border-color: #3b82f6; background-color: rgba(239, 246, 255, 0.9); }
        .upload-area input[type="file"] { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; z-index: 2; }
        
        .upload-icon { font-size: 35px; margin-bottom: 10px; color: #475569; }
        .upload-text { color: #64748b; font-size: 15px; font-weight: 600; }
        .file-name { margin-top: 12px; font-size: 14px; color: #2563eb; font-weight: 700; word-break: break-all; }
        
        .analyze-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; border: none;
            width: 100%; padding: 16px; font-size: 17px; font-weight: 700; border-radius: 14px; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
            position: relative; overflow: hidden;
        }
        .analyze-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(37, 99, 235, 0.3); }
        .analyze-btn:active { transform: translateY(0); }
        .analyze-btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
        
        #resultBox {
            margin-top: 25px; padding: 20px; border-radius: 14px; font-size: 17px; font-weight: 700;
            line-height: 1.8; display: none; text-align: right; 
            overflow-x: auto; /* شريط تمرير للمعادلات الطويلة في الموبايل */
            direction: rtl; 
        }
        
        mjx-container { display: inline-block !important; direction: ltr; max-width: 100%; }
        
        .correct { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .incorrect { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; animation: shake 0.4s ease-in-out; }
        .loading-state { background: #f8fafc; color: #475569; border: 1px solid #e2e8f0; text-align: center !important; }
        
        @keyframes popIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        
        .loader {
            border: 3px solid #e2e8f0; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px;
            animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-left: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 📱 تعديلات خاصة بشاشات الموبايل 📱 */
        @media (max-width: 600px) {
            .glass-card { padding: 30px 20px; border-radius: 20px; }
            h1 { font-size: 24px; }
            p.subtitle { font-size: 14px; margin-bottom: 25px; }
            .header-icon { font-size: 40px; }
            .upload-area { padding: 25px 10px; }
            .upload-icon { font-size: 30px; }
            .upload-text { font-size: 14px; }
            .analyze-btn { padding: 15px; font-size: 16px; }
            #resultBox { font-size: 15px; padding: 15px; }
            /* إخفاء بعض الرموز لتخفيف الزحمة على الموبايل */
            .symbol-1, .symbol-4 { display: none; }
            .symbol-2 { font-size: 60px; top: 80%; left: 5%; }
            .symbol-3 { font-size: 50px; top: 10%; right: 5%; }
        }
    </style>
</head>
<body>

<div class="math-symbol symbol-1">∫</div>
<div class="math-symbol symbol-2">π</div>
<div class="math-symbol symbol-3">∑</div>
<div class="math-symbol symbol-4">√</div>

<div class="glass-card">
    <div class="header-icon">✨</div>
    <h1>مساعد و مدقق الرياضي</h1>
    <p class="subtitle">صور مسألتك، وسأكتشف الخطأ في ثوانٍ</p>
    
    <div class="upload-area" id="uploadArea">
        <input type="file" id="imageInput" accept="image/*" onchange="updateFileName()">
        <div class="upload-icon">📸</div>
        <div class="upload-text">اضغط هنا لالتقاط أو رفع صورة الحل</div>
        <div id="fileNameDisplay" class="file-name"></div>
    </div>

    <button class="analyze-btn" onclick="analyzeImage()" id="analyzeBtn">بدء الفحص الذكي</button>

    <div id="resultBox"></div>
</div>

<script>
    function updateFileName() {
        const input = document.getElementById('imageInput');
        const display = document.getElementById('fileNameDisplay');
        if (input.files.length > 0) {
            display.innerText = "✓ تم إرفاق: " + input.files[0].name;
        }
    }

    async function analyzeImage() {
        const fileInput = document.getElementById('imageInput');
        const resultBox = document.getElementById('resultBox');
        const analyzeBtn = document.getElementById('analyzeBtn');
        
        if (!fileInput.files[0]) {
            alert("يرجى التقاط أو إرفاق صورة الحل أولاً!");
            return;
        }

        resultBox.className = "loading-state";
        resultBox.style.display = "block";
        resultBox.innerHTML = '<div class="loader"></div> جاري تحليل الخطوات...';
        analyzeBtn.disabled = true;
        analyzeBtn.innerText = "جاري التحليل...";

        const formData = new FormData();
        formData.append('image', fileInput.files[0]);

        try {
            const response = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await response.json();
            
            let resultText = data.analysis || data.error;
            resultBox.classList.remove("loading-state");
            void resultBox.offsetWidth; 

            resultBox.innerText = resultText;

            if (window.MathJax) {
                MathJax.typesetPromise([resultBox]).catch(function (err) { console.log('MathJax error: ', err.message); });
            }

            if (resultText.includes("✅")) {
                resultBox.className = "correct";
            } else if (resultText.includes("❌")) {
                resultBox.className = "incorrect";
            } else {
                resultBox.className = "loading-state"; 
            }
            
        } catch (error) {
            resultBox.className = "incorrect";
            resultBox.innerText = "حدث خطأ في الاتصال. تأكد من جودة الإنترنت.";
        } finally {
            analyzeBtn.disabled = false;
            analyzeBtn.innerText = "بدء الفحص الذكي";
        }
    }
</script>

</body>
</html>
